services:
  mysql:
    image: mysql:8.4
    container_name: edu_ml_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE must be set}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER must be set}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./src/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  python-api:
    build:
      context: ./src/python-api
    container_name: edu_ml_python_api
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE must be set}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER must be set}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set}
    ports:
      - "127.0.0.1:${PYTHON_API_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).getcode()==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - appnet

  php-web:
    build:
      context: ./src/php-web
    container_name: edu_ml_php_web
    restart: unless-stopped
    environment:
      PYTHON_API_URL: http://python-api:8000
    ports:
      - "127.0.0.1:${PHP_WEB_PORT:-8080}:80"
    depends_on:
      python-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "$$r=@file_get_contents('http://127.0.0.1/'); if($$r===false) { exit(1);} exit(0);"]
      interval: 20s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/apache2
      - /var/lock/apache2
      - /var/log/apache2
    networks:
      - appnet

  js-web:
    build:
      context: ./src/js-web
    container_name: edu_ml_js_web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${JS_WEB_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 20s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - appnet

  java-app:
    build:
      context: ./src/java-app
    container_name: edu_ml_java_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${JAVA_APP_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8082/health"]
      interval: 20s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

