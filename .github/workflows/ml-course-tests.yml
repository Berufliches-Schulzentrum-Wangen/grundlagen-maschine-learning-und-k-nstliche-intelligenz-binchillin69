name: ML Course Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  pytest-ml-course:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas matplotlib scikit-learn

      - name: Run all ML tests
        run: python -m pytest tests/ -v
