name: Live Stack CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  live-stack-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/CHANGE_ME_ROOT_PASSWORD_MIN_16/SuperSicherRootPass123!/g' .env
          sed -i 's/CHANGE_ME_APP_PASSWORD_MIN_16/SuperSicherAppPass123!/g' .env

      - name: Build and start services
        run: docker compose up -d --build

      - name: Run live functional test
        run: |
          chmod +x tests/live/test_live_stack.sh
          ./tests/live/test_live_stack.sh

      - name: Run security smoke test
        run: |
          chmod +x tests/live/security_smoke.sh
          ./tests/live/security_smoke.sh

      - name: Shutdown
        if: always()
        run: docker compose down -v
